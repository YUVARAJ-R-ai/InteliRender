version: '3.8'

networks:
  app_network:
    driver: bridge

services:
  db:
    image: postgres:15-alpine
    container_name: intellirender_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-intellirender}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_network
    restart: unless-stopped

  mcp-server:
    build: ./services/mcp-server
    container_name: intellirender_mcp_server
    ports:
      - "8001:8001"
    environment:
      - EXA_API_KEY=${EXA_API_KEY:-}
    networks:
      - app_network
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: runner
    container_name: intellirender_frontend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/intellirender}
      - MCP_SERVER_URL=http://mcp-server:8001/mcp
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      - db
      - mcp-server
    networks:
      - app_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: intellirender_redis
    volumes:
      - redis_data:/data
    networks:
      - app_network
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
