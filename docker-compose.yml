version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: intellirender_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: intellirender
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: ./services/api
    container_name: intellirender_api
    ports:
      - "8000:8000"
    environment:
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXTJS_URL=${NEXTJS_URL:-http://host.docker.internal:3000}
    depends_on:
      - db
    volumes:
      - ./services/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  pgdata:
