<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mini Contra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: monospace;
        }
        canvas {
            border: 2px solid #444;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <script>
        const c = document.getElementById('c'),
            ctx = c.getContext('2d');
        c.width = 800;
        c.height = 400;

        // --- GAME STATE ---
        let G = {
            p: { x: 60, y: 280, w: 16, h: 28, vx: 0, vy: 0, onGround: false, hp: 3, invincible: 0, dir: 1 },
            bullets: [],
            enemies: [],
            explosions: [],
            score: 0,
            gameOver: false,
            win: false,
            keys: {},
            frame: 0,
            spawnTimer: 0,
            stage: 0,
            bgOffset: 0
        };

        // --- INPUT ---
        document.addEventListener('keydown', e => { G.keys[e.key] = true;
            e.preventDefault() });
        document.addEventListener('keyup', e => { G.keys[e.key] = false;
            e.preventDefault() });

        // --- HELPERS ---
        function rect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        function drawPlayer() {
            const p = G.p;
            // body
            ctx.fillStyle = p.invincible > 0 && G.frame % 4 < 2 ? '#aaa' : '#4a9';
            ctx.fillRect(p.x, p.y, p.w, p.h);
            // head
            ctx.fillStyle = '#ed7';
            ctx.fillRect(p.x + 2, p.y - 6, 12, 10);
            // eyes
            ctx.fillStyle = '#222';
            ctx.fillRect(p.x + (p.dir > 0 ? 10 : 2), p.y - 4, 3, 3);
            // gun
            ctx.fillStyle = '#876';
            ctx.fillRect(p.x + (p.dir > 0 ? p.w : -8), p.y + 4, 10, 4);
            // bandana
            ctx.fillStyle = '#c33';
            ctx.fillRect(p.x + 2, p.y - 8, 12, 3);
            // legs
            ctx.fillStyle = '#363';
            ctx.fillRect(p.x + 1, p.y + p.h - 4, 6, 6);
            ctx.fillRect(p.x + 9, p.y + p.h - 4, 6, 6);
        }

        function drawEnemy(e) {
            ctx.fillStyle = '#b44';
            ctx.fillRect(e.x, e.y, e.w, e.h);
            ctx.fillStyle = '#d66';
            ctx.fillRect(e.x + 2, e.y - 5, 10, 8);
            ctx.fillStyle = '#222';
            ctx.fillRect(e.x + (e.vx < 0 ? 8 : 2), e.y - 3, 3, 3);
            // gun
            ctx.fillStyle = '#665';
            ctx.fillRect(e.x + (e.vx < 0 ? -6 : e.w), e.y + 3, 8, 3);
        }

        function drawBullet(b) {
            ctx.fillStyle = '#ff4';
            ctx.shadowColor = '#fa0';
            ctx.shadowBlur = 8;
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.shadowBlur = 0;
        }

        function spawnEnemy() {
            const side = Math.random() < 0.5 ? 0 : 1;
            const x = side ? 0 : c.width;
            const y = 260 + Math.random() * 50;
            const hp = 1 + Math.floor(G.score / 30);
            G.enemies.push({
                x: x,
                y: y,
                w: 16,
                h: 26,
                vx: side ? 1.2 + Math.random() * 0.6 : -(1.2 + Math.random() * 0.6),
                vy: 0,
                hp: hp,
                maxHp: hp,
                shootTimer: 40 + Math.random() * 60
            });
        }

        function shootBullet(from, vx, vy, isEnemy) {
            G.bullets.push({
                x: from.x + (vx > 0 ? from.w : -4),
                y: from.y + 10,
                w: 8,
                h: 4,
                vx: vx,
                vy: vy || 0,
                enemy: !!isEnemy,
                life: 80
            });
        }

        function spawnExplosion(x, y) {
            for (let i = 0; i < 6; i++) {
                G.explosions.push({
                    x: x + Math.random() * 20 - 10,
                    y: y + Math.random() * 20 - 10,
                    vx: Math.random() * 4 - 2,
                    vy: Math.random() * 4 - 2 - 1,
                    life: 20 + Math.random() * 15,
                    size: 3 + Math.random() * 4,
                    color: ['#f84', '#fa0', '#ff4', '#f44'][Math.floor(Math.random() * 4)]
                });
            }
        }

        // --- UPDATE ---
        function update() {
            if (G.gameOver || G.win) return;

            const p = G.p;
            const k = G.keys;

            // Player movement
            p.vx = 0;
            if (k['ArrowLeft'] || k['a']) { p.vx = -4;
                p.dir = -1 }
            if (k['ArrowRight'] || k['d']) { p.vx = 4;
                p.dir = 1 }
            if ((k['ArrowUp'] || k['w'] || k[' ']) && p.onGround) {
                p.vy = -9;
                p.onGround = false;
            }

            // Gravity
            p.vy += 0.45;
            p.x += p.vx;
            p.y += p.vy;

            // Ground collision
            if (p.y + p.h > 310) { p.y = 310 - p.h;
                p.vy = 0;
                p.onGround = true }
            if (p.y < 40) { p.y = 40;
                p.vy = 0 }

            // Stage boundaries
            if (p.x < 10) p.x = 10;
            if (p.x > c.width - p.w - 10) p.x = c.width - p.w - 10;

            // Invincibility timer
            if (p.invincible > 0) p.invincible--;

            // Shooting (player)
            if (k['z'] || k['shift']) {
                if (!G._lastShot || G.frame - G._lastShot > 12) {
                    G._lastShot = G.frame;
                    shootBullet(p, p.dir * 8, 0, false);
                }
            }

            // Spawn enemies
            G.spawnTimer++;
            const spawnRate = Math.max(20, 60 - G.score * 0.3);
            if (G.spawnTimer > spawnRate && G.enemies.length < 8 + Math.floor(G.score / 20)) {
                G.spawnTimer = 0;
                spawnEnemy();
            }

            // Update bullets
            for (let i = G.bullets.length - 1; i >= 0; i--) {
                const b = G.bullets[i];
                b.x += b.vx;
                b.y += (b.vy || 0);
                b.life--;
                if (b.x < -20 || b.x > c.width + 20 || b.y < -20 || b.y > c.height + 20 || b.life <= 0) {
                    G.bullets.splice(i, 1);
                    continue;
                }
                // Hit enemies (player bullets)
                if (!b.enemy) {
                    for (let j = G.enemies.length - 1; j >= 0; j--) {
                        const e = G.enemies[j];
                        if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                            e.hp--;
                            spawnExplosion(b.x, b.y);
                            G.bullets.splice(i, 1);
                            if (e.hp <= 0) {
                                spawnExplosion(e.x + e.w / 2, e.y + e.h / 2);
                                G.score += 10;
                                G.enemies.splice(j, 1);
                            }
                            break;
                        }
                    }
                }
                // Hit player (enemy bullets)
                if (b.enemy) {
                    if (b.x < p.x + p.w && b.x + b.w > p.x && b.y < p.y + p.h && b.y + b.h > p.y) {
                        if (p.invincible <= 0) {
                            p.hp--;
                            p.invincible = 40;
                            spawnExplosion(p.x + p.w / 2, p.y + p.h / 2);
                            if (p.hp <= 0) { G.gameOver = true }
                        }
                        G.bullets.splice(i, 1);
                    }
                }
            }

            // Update enemies
            for (let i = G.enemies.length - 1; i >= 0; i--) {
                const e = G.enemies[i];
                // Move toward player
                const dx = p.x - e.x;
                const dy = p.y - e.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 0) {
                    e.vx += (dx / dist) * 0.15;
                    e.vy += (dy / dist) * 0.1;
                }
                const spd = Math.sqrt(e.vx * e.vx + e.vy * e.vy);
                if (spd > 3) { e.vx = (e.vx / spd) * 3;
                    e.vy = (e.vy / spd) * 3 }
                e.x += e.vx;
                e.y += e.vy;
                // Ground
                if (e.y + e.h > 310) { e.y = 310 - e.h;
                    e.vy = 0 }
                if (e.y < 40) { e.y = 40;
                    e.vy = 0 }
                if (e.x < 10) e.x = 10;
                if (e.x > c.width - e.w - 10) e.x = c.width - e.w - 10;

                // Enemy shoots
                e.shootTimer--;
                if (e.shootTimer <= 0 && Math.abs(dx) < 400) {
                    e.shootTimer = 50 + Math.random() * 40;
                    const angle = Math.atan2(dy, dx);
                    shootBullet(e, Math.cos(angle) * 4, Math.sin(angle) * 4, true);
                }

                // Collision with player
                if (e.x < p.x + p.w && e.x + e.w > p.x && e.y < p.y + p.h && e.y + e.h > p.y) {
                    if (p.invincible <= 0) {
                        p.hp--;
                        p.invincible = 40;
                        spawnExplosion(p.x + p.w / 2, p.y + p.h / 2);
                        if (p.hp <= 0) { G.gameOver = true }
                    }
                    // Push enemy away
                    e.x += (e.x > p.x ? 1 : -1) * 20;
                    e.y -= 10;
                }
            }

            // Update explosions
            for (let i = G.explosions.length - 1; i >= 0; i--) {
                const ex = G.explosions[i];
                ex.x += ex.vx;
                ex.y += ex.vy;
                ex.vy += 0.1;
                ex.life--;
                if (ex.life <= 0) G.explosions.splice(i, 1);
            }

            // Background scroll
            G.bgOffset = (G.bgOffset + 0.3) % 80;

            // Win condition (score)
            if (G.score >= 200) G.win = true;
            G.frame++;
        }

        // --- DRAW ---
        function draw() {
            // Sky gradient
            const grad = ctx.createLinearGradient(0, 0, 0, c.height);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(0.5, '#16213e');
            grad.addColorStop(1, '#0f3460');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, c.width, c.height);

            // Stars
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 40; i++) {
                const sx = (i * 137 + 50) % c.width;
                const sy = (i * 89 + 30) % (c.height * 0.6);
                const ss = 0.5 + (i % 3) * 0.5;
                ctx.globalAlpha = 0.3 + (i % 4) * 0.2;
                ctx.fillRect(sx, sy, ss, ss);
            }
            ctx.globalAlpha = 1;

            // Ground
            ctx.fillStyle = '#2a1f0e';
            ctx.fillRect(0, 310, c.width, 90);
            ctx.fillStyle = '#3d2b1a';
            for (let x = -G.bgOffset; x < c.width + 80; x += 80) {
                ctx.fillRect(x, 310, 42, 8);
                ctx.fillStyle = '#5a3d2b';
                ctx.fillRect(x + 8, 318, 26, 6);
                ctx.fillStyle = '#3d2b1a';
            }
            // Grass
            ctx.fillStyle = '#2d5a1e';
            ctx.fillRect(0, 306, c.width, 6);

            // Mountains
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.moveTo(0, 310);
            for (let x = 0; x <= c.width; x += 10) {
                const y = 200 + Math.sin(x * 0.005 + 1) * 40 + Math.sin(x * 0.012) * 20 + Math.sin(x * 0.003) * 30;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(c.width, 310);
            ctx.fill();

            // Trees (simple)
            ctx.fillStyle = '#1a3a1a';
            for (let x = 20; x < c.width; x += 90 + Math.sin(x) * 20) {
                const ty = 290 + Math.sin(x * 0.1) * 10;
                ctx.fillRect(x, ty - 40, 12, 45);
                ctx.fillStyle = '#2a5a2a';
                ctx.beginPath();
                ctx.arc(x + 6, ty - 44, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#1a3a1a';
            }

            // Bridges / platforms
            ctx.fillStyle = '#654';
            ctx.fillRect(150, 240, 120, 10);
            ctx.fillRect(500, 200, 100, 10);
            ctx.fillRect(320, 160, 80, 10);
            ctx.fillStyle = '#876';
            ctx.fillRect(150, 240, 120, 3);
            ctx.fillRect(500, 200, 100, 3);
            ctx.fillRect(320, 160, 80, 3);

            // Draw bullets
            G.bullets.forEach(drawBullet);

            // Draw enemies
            G.enemies.forEach(drawEnemy);

            // Draw player
            drawPlayer();

            // Draw explosions
            G.explosions.forEach(ex => {
                ctx.globalAlpha = ex.life / 30;
                ctx.fillStyle = ex.color;
                ctx.fillRect(ex.x, ex.y, ex.size, ex.size);
                ctx.shadowColor = ex.color;
                ctx.shadowBlur = 10;
                ctx.fillRect(ex.x + 1, ex.y + 1, ex.size - 2, ex.size - 2);
                ctx.shadowBlur = 0;
            });
            ctx.globalAlpha = 1;

            // HUD
            ctx.fillStyle = '#fff';
            ctx.font = '14px monospace';
            ctx.fillText('HP: ' + '♥'.repeat(Math.max(0, G.p.hp)) + '♡'.repeat(Math.max(0, 3 - G.p.hp)), 16, 24);
            ctx.fillText('SCORE: ' + G.score, 16, 44);
            ctx.fillText('ENEMIES: ' + G.enemies.length, 16, 62);

            // Game over / win
            if (G.gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, c.width, c.height);
                ctx.fillStyle = '#f44';
                ctx.font = 'bold 48px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', c.width / 2, c.height / 2 - 10);
                ctx.font = '18px monospace';
                ctx.fillStyle = '#fff';
                ctx.fillText('Press R to restart', c.width / 2, c.height / 2 + 50);
                ctx.textAlign = 'left';
            }
            if (G.win) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, c.width, c.height);
                ctx.fillStyle = '#4f4';
                ctx.font = 'bold 48px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('VICTORY!', c.width / 2, c.height / 2 - 10);
                ctx.font = '18px monospace';
                ctx.fillStyle = '#fff';
                ctx.fillText('Press R to restart', c.width / 2, c.height / 2 + 50);
                ctx.textAlign = 'left';
            }
        }

        // --- RESTART ---
        document.addEventListener('keydown', e => {
            if ((e.key === 'r' || e.key === 'R') && (G.gameOver || G.win)) {
                G = {
                    p: { x: 60, y: 280, w: 16, h: 28, vx: 0, vy: 0, onGround: false, hp: 3, invincible: 0, dir: 1 },
                    bullets: [],
                    enemies: [],
                    explosions: [],
                    score: 0,
                    gameOver: false,
                    win: false,
                    keys: {},
                    frame: 0,
                    spawnTimer: 0,
                    stage: 0,
                    bgOffset: 0,
                    _lastShot: 0
                };
            }
        });

        // --- LOOP ---
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
