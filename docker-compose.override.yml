version: '3.8'

# Dev overrides — auto-loaded by `docker compose up`
# Adds hot-reload, exposes internal ports to host for local tooling

services:
  db:
    ports:
      - "5432:5432"

  api:
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      target: deps
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    environment:
      - NODE_ENV=development
